name: spark_app
description: Spark - EV Charging Booking Platform
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # UI
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  flutter_rating_bar: ^4.0.1
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  
  # State Management
  provider: ^6.1.2
  
  # Network
  http: ^1.2.2
  
  # Maps
  mapbox_maps_flutter: ^2.4.0
  
  # Location
  geolocator: ^13.0.2
  geocoding: ^3.0.0
  
  # Payments
  flutter_stripe: ^11.2.0
  
  # Auth
  google_sign_in: ^6.2.1
  sign_in_with_apple: ^6.1.3
  
  # Storage
  shared_preferences: ^2.3.3
  flutter_secure_storage: ^9.2.2
  
  # Firebase
  firebase_core: ^3.8.1
  firebase_messaging: ^15.1.6
  
  # Utilities
  intl: ^0.19.0
  url_launcher: ^6.3.1
  image_picker: ^1.1.2
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
